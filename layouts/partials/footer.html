<footer class="footer">
    {{- $totalWords := 0 -}}
    {{- range (where .Site.RegularPages "Section" "posts") -}}
        {{- $totalWords = add $totalWords .WordCount -}}
    {{- end -}}
    
    <div class="busuanzi-footer">
        <span>一共记下了
             {{ $totalWords }} 字</span>
    </div>

    {{- if .Site.Copyright }}
    <span>{{ .Site.Copyright | markdownify }}</span>
    {{- else }}
    <span>&copy; {{ now.Year }} <a href="{{ "" | absLangURL }}">{{ .Site.Title }}</a></span>
    {{- end }}
</footer>
